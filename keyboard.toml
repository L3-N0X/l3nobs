[keyboard]
name = "L3NOBS"
product_name = "l3nobs"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "Leon Goett"
chip = "esp32s3"
usb_enable = true

[matrix]
# Row and col pins are mandatory
row_pins = ["GPIO4", "GPIO5", "GPIO6", "GPIO7"]
col_pins = ["GPIO2", "GPIO1", "GPIO15", "GPIO8"]

# RMK uses col2row as the default matrix diode direction, if you want to use a row2col matrix, add `row2col = true`
# row2col = true

[layout]
rows = 4
cols = 4
layers = 5
matrix_map = """
(0,1) (0,2) (0,3)
(1,0) (1,1) (1,2) (1,3)
(2,0) (2,1) (2,2) (2,3)
(3,1) (3,2)
"""

[[input_device.encoder]]
pin_a = "GPIO16"
pin_b = "GPIO17"
phase = "resolution"
resolution = 2

[aliases]
cut = "WM(X, LCtrl)"
copy = "WM(C, LCtrl)"
paste = "WM(V, LCtrl)"

[[layer]]  # Layer 0
name = "base"
encoders = [["AudioVolUp", "AudioVolDown"]]
keys = """
AudioMute   MediaPlayPause  TO(base)
MediaPrevTrack MediaRewind MediaFastForward MediaNextTrack
TO(layer1) TO(layer2) TO(layer3) TO(layer4)
ControlPanel Calculator
"""


[[layer]]  # Layer 1
name = "layer1"
encoders = [["BrightnessUp", "BrightnessDown"]]
keys="""
_ _ TO(base)
_ _ _ _
_ _ _ _
_ _
"""


[[layer]]  # Layer 2
name = "layer2"
encoders = [["MouseWheelUp", "MouseWheelDown"]]
keys = """
_ _ TO(base)
_ _ _ _
_ _ _ _
_ _
"""


[[layer]]  # Layer 3
name = "layer3"
encoders = [["_", "_"]]
keys="""
_ _ TO(base)
_ _ _ _
_ _ _ _
_ _
"""

[[layer]]  # Layer 4
name = "layer4"
encoders = [["_", "_"]]
keys="""
_ _ TO(base)
_ _ _ _
_ _ _ _
_ _
"""

[ble]
enabled = true

[storage]
enabled = true
start_addr = 0x3f0000
num_sectors = 16
